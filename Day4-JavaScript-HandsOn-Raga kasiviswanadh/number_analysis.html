<!--Problem 5: Number Analysis Tool (Level-2)
Scenario
A utility program is required to analyze numbers and provide insights such as positivity, parity, and range.
📌 Requirements
•	Store a number in a variable
•	Use conditional (ternary) operator to check:
•	Positive or Negative
•	Use if–else to check:
•	Even or Odd
•	Use a loop to print all numbers from 1 to the given number

🛠️ Technical Constraints
•	Store a number in a variable
•	Use conditional (ternary) operator to check:
•	Positive or Negative
•	Use if–else to check:
•	Even or Odd
•	Use a loop to print all numbers from 1 to the given number

🎯 Learning Outcome
You will be able to:
•	Combine multiple control flow techniques
•	Use loops for iteration
•	Apply conditional operators
•	Build multi-step logical programs
-->
<!DOCTYPE html>
<html>
<head>
    <title>Number Analysis Tool</title>
</head>
<body>

<h2>Number Analysis Tool</h2>

<script>
    let number =prompt("enter the number:");

    // Positive or Negative (Ternary)
    let result = (number >= 0) ? "Positive" : "Negative";
    document.write("Number is: " + result + "<br>");

    // Even or Odd
    if (number % 2 === 0) {
        document.write("It is an Even Number<br>");
    } else {
        document.write("It is an Odd Number<br>");
    }

    // Print numbers from 1 to given number
    document.write("Numbers from 1 to " + number + ":<br>");
    for (let i = 1; i <= number; i++) {
        document.write(i + "<br>");
    }
</script>

</body>
</html>
<!--EXPLAINATION:
A number is stored in a variable.

Ternary operator checks whether number is positive or negative.

The result is printed in console.

If-else statement checks whether number is even or odd.

Modulus operator (%) is used to determine parity.

A for loop prints numbers from 1 to given number.

The loop runs until the condition becomes false.

This combines conditional operator, if-else, and looping.
-->

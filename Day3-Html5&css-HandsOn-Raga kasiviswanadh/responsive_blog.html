<!--Problem 4: Responsive Blog Layout (Level-2)
Scenario
You are creating a blog homepage that displays articles in a modern responsive layout suitable for desktop, tablet, and mobile screens.
📌 Requirements
Create a page layout with:
•	Header
•	Main content area with multiple blog cards
Use:
•	Flexbox or CSS Grid for layout
•	Box model for spacing
Each blog card should contain:
•	Title
•	Short description
•	Read More button
Apply:
•	Background colors
•	Borders
•	Typography enhancements
Use media queries to:
•	Display multiple columns on desktop
•	Switch to single column on mobile
🛠️ Technical Constraints
•	Only HTML + CSS
•	No CSS frameworks
•	No fixed widths (use percentages or flexible units)
🎯 Learning Outcome
Learners should be able to:
•	Understand Flexbox/Grid layouts
•	Apply responsive design principles
•	Write effective media queries
•	Build real-world page layouts
-->
<!DOCTYPE html>
<html>
<head>
    <title>Responsive Blog</title>
    <style>
        body {
            font-family: Arial;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background-color: #44a54c;
            padding: 15px;
            border: 1px solid #ccc;
            flex: 1 1 30%;
        }

        @media (max-width: 768px) {
            .card {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1 style="text-align:center;">My Blog</h1>
</header>

<div class="container">
    <div class="card">
        <h3>Blog Title 1</h3>
        <p>Short description of the blog post.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <h3>Blog Title 2</h3>
        <p>Short description of the blog post.</p>
        <button>Read More</button>
    </div>
</div>

</body>
</html>

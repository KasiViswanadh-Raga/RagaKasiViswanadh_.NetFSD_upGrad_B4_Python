<!--Problem 5: Responsive Dashboard Layout (Level-2)
Scenario
You are designing a simple admin dashboard layout for a web application.
📌 Requirements
Create a layout with:
•	Sidebar navigation
•	Main content area
•	Info cards inside the main section
Use:
•	display properties
•	Flexbox or Grid for page structure
Style:
•	Sidebar with background color
•	Cards with borders, padding, and margins
Apply media queries to:
•	Convert sidebar into top navigation on mobile
•	Stack cards vertically on small screens
-->
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            display: flex;
            font-family: Arial;
        }

        .sidebar {
            background-color: #333;
            color: white;
            padding: 20px;
            width: 20%;
        }

        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            padding: 15px;
            border: 1px solid #ccc;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
            .main {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Dashboard</h2>
    <p>Home</p>
    <p>Settings</p>
</div>

<div class="main">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
</div>

</body>
</html>
